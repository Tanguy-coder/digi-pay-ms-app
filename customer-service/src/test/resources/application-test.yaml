spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  autoconfigure:
    exclude:
      - org.springdoc.webmvc.ui.SwaggerUiWebMvcAutoConfiguration
      - org.springdoc.webmvc.core.configuration.SpringDocWebMvcAutoConfiguration
  cloud:
    config:
      enabled: false
      discovery:
        enabled: false
springdoc:
  api-docs:
    enabled: false
eureka:
  client:
    enabled: false
