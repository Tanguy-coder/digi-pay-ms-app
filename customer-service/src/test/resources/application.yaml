spring:
  application:
    name: customer-service
  jpa:
    hibernate:
      ddl-auto: create-drop
  docker:
    compose:
      enabled: false
  cloud:
    config:
      enabled: false
      discovery:
        enabled: false
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: customerEvent:net.tanguydev.customerservice.Domain.Events.CustomerEvent
eureka:
  client:
    enabled: false
server:
  port: 0
